<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mode 3 - Paint Drop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
    <div style="display: flex; gap: 30px; margin-left: 40px;">
        <a href="index.html" style="color: #fff; text-decoration: none; font-weight: bold;">Home</a>
        <a href="about.html" style="color: #fff; text-decoration: none; font-weight: bold;">About</a>
        <a href="rank.html" style="color: #fff; text-decoration: none; font-weight: bold;">Rank</a>
    </div>
    <a href="login.html" id="profileLink" style="color: #f1c40f; margin-left: auto; margin-right: 40px; text-decoration: none; font-weight: bold;">👤 Login / Profile</a>
</header>

    <div class="game-wrapper theme-paint">
        <header>
            <h1>Paint Drop</h1>
            <div class="stats">
                <span id="roundDisplay">Round: 1 / 5</span>
                <span id="scoreDisplay">Score: 0</span>
            </div>
        </header>

        <p id="instructionText" style="margin-bottom: 20px; color: #bdc3c7;">Click drops to mix. Wash brush to reset!</p>

        <div class="timer-container"><div id="timerBar" class="timer-bar"></div></div>

        <div class="color-arena">
            <div class="color-panel">
                <p>Target</p>
                <div id="targetBox" class="color-circle"></div>
            </div>
            <div class="color-panel">
                <p>Your Mix <span class="drop-counter">(<span id="dropCount">0</span> drops)</span></p>
                <div id="userBox" class="color-circle" style="background-color: #ffffff;"></div>
            </div>
        </div>

        <div class="palette">
            <div class="paint-drop" style="background: #FF0000;" onclick="addDrop(255, 0, 0)"></div>
            <div class="paint-drop" style="background: #00FF00;" onclick="addDrop(0, 255, 0)"></div>
            <div class="paint-drop" style="background: #0000FF;" onclick="addDrop(0, 0, 255)"></div>
            <div class="paint-drop" style="background: #FFFF00;" onclick="addDrop(255, 255, 0)"></div>
            <div class="paint-drop" style="background: #FFFFFF;" onclick="addDrop(255, 255, 255)"></div>
            <div class="paint-drop" style="background: #000000;" onclick="addDrop(0, 0, 0)"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="resetMixBtn" class="action-btn btn-gray" style="width: 40%; font-size: 1rem;">Wash Brush</button>
            <button id="matchBtn" class="action-btn" style="width: 60%;">Match!</button>
        </div>
        
        <div id="gameOverScreen" class="overlay" style="display: none;">
            <div class="modal">
                <h2>Game Over!</h2>
                <p style="font-size: 1.2rem; color: #2c3e50; font-weight: bold; margin-bottom: -10px;">Average Similarity:</p>
                <p id="finalScoreText">0.0%</p>
                <p id="gradeText"></p>
                <button id="restartBtn" class="action-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="color-paint.js"></script>
</body>
</html>
