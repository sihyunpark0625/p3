<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.replace('login.html'); 
        }
    </script>
</head>
<body>
    <header class="main-header">
    <div style="display: flex; gap: 30px; margin-left: 40px;">
        <a href="index.html" style="color: #f1c40f; text-decoration: none; font-weight: bold;">Home</a>
        <a href="about.html" style="color: #fff; text-decoration: none; font-weight: bold;">About</a>
        <a href="rank.html" style="color: #fff; text-decoration: none; font-weight: bold;">Rank</a>
    </div>
    <a href="login.html" id="profileLink" style="color: #bdc3c7; margin-left: auto; margin-right: 40px; text-decoration: none; font-weight: bold;">👤 Login / Profile</a>
</header>

    <div class="hub-container">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Color Arcade</h1>
        <p style="color: #bdc3c7; margin-bottom: 40px;">Test your visual limits with different modes.</p>

        <button class="btn-speedrun" onclick="location.href='color-speed.html'">Mode 1: Speedrun</button>
        <button class="btn-memory" onclick="location.href='color-memory.html'">Mode 2: Memory Match</button>
        <button class="btn-paint" onclick="location.href='color-paint.html'">Mode 3: Paint Drop</button>
        <button class="btn-grid" onclick="location.href='color-grid.html'" style="background-color: #f1c40f; color: #2c3e50;">Mode 4: Color Grid</button>
        <button class="btn-odd" onclick="location.href='color-odd.html'" style="background-color: #e84393;">Mode 5: Odd One Out</button>
    </div>

    <script>
        if (currentUser) {
            document.getElementById('profileLink').innerText = `👤 ${currentUser} (Profile)`;
        }
    </script>
</body>
</html>
